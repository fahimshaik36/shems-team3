<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>SHEMS – Admin Dashboard</title>

<style>
/* ================= THEME ================= */
:root{
 --bg:#f4f7fb;
 --header:#2563eb;
 --card:rgba(255,255,255,.88);
 --text:#1f2937;
 --muted:#6b7280;
 --border:#c7d2fe;
 --primary:#2563eb;
 --accent:#dc2626;
}
body.dark{
 --bg:#0b1020;
 --header:#1e40af;
 --card:rgba(18,24,48,.9);
 --text:#e5e7eb;
 --muted:#9ca3af;
 --border:#1f2a44;
 --primary:#7c9cff;
 --accent:#ef4444;
}

/* ================= BASE ================= */
body{
 margin:0;
 min-height:100vh;
 background:var(--bg);
 color:var(--text);
 font-family:Segoe UI, Arial, sans-serif;
 transition:.3s;
}

/* ================= HEADER ================= */
.app-header{
 height:72px;
 background:var(--header);
 padding:0 32px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.brand .title{
 font-size:18px;
 font-weight:600;
 color:white;
}
.brand .subtitle{
 font-size:13px;
 color:#e0e7ff;
}
.brand .subtitle.small{
 font-size:12px;
 opacity:.9;
}

.header-actions{
 display:flex;
 align-items:center;
 gap:12px;
}

.theme-btn{
 background:rgba(255,255,255,.18);
 border:1px solid rgba(255,255,255,.4);
 color:white;
 padding:6px 12px;
 border-radius:8px;
 cursor:pointer;
 transition:.2s;
}
.theme-btn:hover{
 background:rgba(255,255,255,.28);
}

.logout-btn{
 background:rgba(255,255,255,.25);
 border:1px solid rgba(255,255,255,.45);
 color:white;
 padding:6px 14px;
 border-radius:8px;
 text-decoration:none;
 font-weight:500;
 transition:.2s;
}
.logout-btn:hover{
 background:rgba(255,255,255,.35);
}

/* ================= PAGE ================= */
.page{
 min-height:calc(100vh - 72px);
 padding:32px;
 display:flex;
 justify-content:center;
 align-items:flex-start;
}

/* ================= DASHBOARD ================= */
.dashboard-card{
 width:100%;
 max-width:780px;
 padding:36px;
 background:var(--card);
 backdrop-filter:blur(16px);
 border-radius:20px;
 box-shadow:0 30px 60px rgba(0,0,0,.18);
 transition:.25s;
}
.dashboard-card:hover{
 transform:translateY(-2px);
 box-shadow:0 38px 70px rgba(0,0,0,.22);
}

.dashboard-header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:30px;
}

.dashboard-header h2{
 margin:0;
 letter-spacing:.3px;
}

/* ================= ROLE BADGE ================= */
.role-badge{
 background:rgba(220,38,38,.12);
 color:var(--accent);
 padding:6px 16px;
 border-radius:999px;
 font-weight:700;
 font-size:13px;
}

/* ================= INFO ================= */
.info{
 font-size:15px;
 margin-bottom:10px;
 color:var(--muted);
}

/* ================= ADMIN NOTICE ================= */
.admin-notice{
 margin-top:28px;
 padding:26px;
 background:rgba(220,38,38,.06);
 border-radius:16px;
 text-align:center;
}

.admin-notice strong{
 display:block;
 margin-bottom:6px;
 color:var(--text);
}

.admin-notice small{
 color:var(--muted);
}
</style>

<script>
function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem(
  "theme",
  document.body.classList.contains("dark") ? "dark" : "light"
 );
}
window.onload=()=>{
 if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
 }
}
</script>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="app-header">
 <div class="brand">
  <div class="title">SHEMS – Authentication Module</div>
  <div class="subtitle">Smart Home Energy Management System</div>
  <div class="subtitle small">Role-Based Access: Admin & User</div>
 </div>

 <div class="header-actions">
  <button class="theme-btn" onclick="toggleTheme()">🌓</button>
  <a th:href="@{/logout}" class="logout-btn">Logout</a>
 </div>
</div>

<!-- ================= CONTENT ================= -->
<div class="page">
 <div class="dashboard-card">

  <div class="dashboard-header">
   <h2>Admin Dashboard</h2>
   <span class="role-badge">ADMIN</span>
  </div>

  <div class="info" th:text="'Logged in as: ' + ${userDetails}">
   Logged in as
  </div>

  <!-- ADMIN STATUS / NOTICE -->
  <div class="admin-notice">
   <strong>Administrative Access Enabled</strong>
   <small>You have full control over system-level operations.</small>
  </div>

 </div>
</div>

</body>
</html>
